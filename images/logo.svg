<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#001A33"/>
      <stop offset="60%" style="stop-color:#E60000"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001A33"/>
      <stop offset="100%" style="stop-color:#003366"/>
    </linearGradient>
  </defs>

  <!-- Gear icon (left) -->
  <g transform="translate(45, 100)">
    <!-- Outer gear -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#gearGrad)" stroke-width="6"/>
    <!-- Gear teeth -->
    <g stroke="url(#gearGrad)" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-70"/>
      <line x1="0" y1="58" x2="0" y2="70"/>
      <line x1="-58" y1="0" x2="-70" y2="0"/>
      <line x1="58" y1="0" x2="70" y2="0"/>
      <line x1="-41" y1="-41" x2="-49.5" y2="-49.5"/>
      <line x1="41" y1="41" x2="49.5" y2="49.5"/>
      <line x1="41" y1="-41" x2="49.5" y2="-49.5"/>
      <line x1="-41" y1="41" x2="-49.5" y2="49.5"/>
    </g>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#gearGrad)" stroke-width="4"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#E60000"/>
  </g>

  <!-- Flame icon (inside gear, offset right) -->
  <g transform="translate(30, 100)">
    <path d="M15 35 
             C15 20, 25 10, 30 -5 
             C35 10, 45 20, 45 35 
             C45 45, 38 50, 30 50 
             C22 50, 15 45, 15 35Z" 
          fill="url(#flameGrad)" opacity="0.95"/>
    <ellipse cx="30" cy="35" rx="8" ry="12" fill="#FFD700" opacity="0.6"/>
  </g>

  <!-- Vertical divider -->
  <line x1="130" y1="35" x2="130" y2="165" stroke="#001A33" stroke-width="2" opacity="0.2"/>

  <!-- Text: GAS -->
  <text x="155" y="82" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="58" fill="#001A33" letter-spacing="4">GAS</text>

  <!-- Text: Inpex -->
  <text x="155" y="130" font-family="'Segoe UI', 'Arial', sans-serif" font-weight="300" font-size="42" fill="#E60000" letter-spacing="8">INPEX</text>

  <!-- Subtitle line -->
  <line x1="155" y1="140" x2="420" y2="140" stroke="#E60000" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="155" y="162" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="11" fill="#666" letter-spacing="4">ИНЖИНИРИНГ · АВТОМАТИЗАЦИЯ · СНАБЖЕНИЕ</text>
</svg>